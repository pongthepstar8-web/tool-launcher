<!DOCTYPE html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Factory Tool Launcher</title>

    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Segoe UI', sans-serif;
      }

      body {
        background: #f4f6f9;
        min-height: 100vh;
        padding: 30px;
      }

      h1 {
        text-align: center;
        color: #333;
        margin-bottom: 30px;
      }

      #loginBox {
        text-align: center;
        margin-top: 100px;
      }

      #launcher {
        display: none;
      }

      .topbar {
        max-width: 1200px;
        margin: 0 auto 30px auto;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .user-box {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .user-box img {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
      }

      .logout-btn {
        background: #dc3545;
        color: white;
        border: none;
        padding: 8px 15px;
        border-radius: 8px;
        cursor: pointer;
      }

      .tool-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 20px;
        max-width: 1200px;
        margin: auto;
      }

      .tool-card {
        background: white;
        border-radius: 20px;
        padding: 25px;
        text-align: center;
        cursor: pointer;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        transition: 0.3s;
      }

      .tool-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      }

      .icon {
        width: 90px;
        height: 90px;
        margin: auto;
        border-radius: 20px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 42px;
        color: white;
        margin-bottom: 15px;
      }

      .blue {
        background: #0078d4;
      }

      .green {
        background: #28a745;
      }

      .orange {
        background: #ff9800;
      }

      .purple {
        background: #9c27b0;
      }

      .title {
        font-size: 18px;
        font-weight: bold;
      }

      .desc {
        color: #666;
        margin-top: 8px;
      }
      #loginBox {
        text-align: center;
        margin-top: 50px;
      }

      .login-card {
        background: white;
        max-width: 400px;
        margin: auto;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      }
    </style>
  </head>

  <body>
    <h1>🏭 Factory Tool Launcher</h1>

    <div id="loginBox">
      <div class="login-card">
        <h2>🔐 Login ด้วย Google</h2>

        <br />

        <div
          id="g_id_onload"
          data-client_id="1044067230852-207pud3phh099ps6uq14dn770ce16alf.apps.googleusercontent.com"
          data-context="signin"
          data-ux_mode="popup"
          data-callback="handleCredentialResponse"
          data-auto_prompt="false"
        ></div>

        <div
          class="g_id_signin"
          data-type="standard"
          data-shape="pill"
          data-theme="filled_blue"
          data-size="large"
        ></div>
      </div>
    </div>

    <div id="launcher">
      <div class="topbar">
        <div id="googleBtn"></div>

        <div class="user-box">
          <img id="avatar" alt="" />
          <span id="username"></span>
          <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
      </div>

      <div class="tool-grid">
        <div
          class="tool-card"
          onclick="window.open('https://pongthepstar8-web.github.io/Dashboard-PRO-MAX/','_blank')"
        >
          <div class="icon blue">🚀</div>
          <div class="title">Dashboard PRO MAX</div>
          <div class="desc">Production Dashboard</div>
        </div>

        <div
          class="tool-card"
          onclick="window.open('https://pongthepstar8-web.github.io/Report-EDS-OSP/','_blank')"
        >
          <div class="icon green">📋</div>
          <div class="title">Field Report Dashboard</div>
          <div class="desc">Report Management</div>
        </div>

        <div
          class="tool-card"
          onclick="alert('เพิ่ม URL ระบบ Inventory ภายหลัง')"
        >
          <div class="icon orange">📦</div>

          <div class="title">Inventory System</div>

          <div class="desc">Stock Management</div>
        </div>

        <div
          class="tool-card"
          onclick="alert('เพิ่ม URL ระบบ Maintenance ภายหลัง')"
        >
          <div class="icon purple">🔧</div>

          <div class="title">Maintenance System</div>

          <div class="desc">PM & Breakdown</div>
        </div>
      </div>
    </div>

    <script>
      function parseJwt(token) {
        const base64Url = token.split('.')[1];

        const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');

        return JSON.parse(
          decodeURIComponent(
            atob(base64)
              .split('')
              .map(function (c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
              })
              .join('')
          )
        );
      }
      function handleCredentialResponse(response) {
        console.log(response);

        localStorage.setItem('googleCredential', response.credential);

        document.getElementById('loginBox').style.display = 'none';
        document.getElementById('launcher').style.display = 'block';

        document.getElementById('username').innerText = 'Google User';
      }

      function showLauncher(data) {
        document.getElementById('loginBox').style.display = 'none';

        document.getElementById('launcher').style.display = 'block';

        document.getElementById('username').innerText =
          data.name || data.email || 'User';

        document.getElementById('avatar').src = data.picture || '';
      }

      function logout() {
        localStorage.clear();

        if (window.google) {
          google.accounts.id.disableAutoSelect();
        }

        document.getElementById('launcher').style.display = 'none';
        document.getElementById('loginBox').style.display = 'block';

        location.reload();
      }
      window.onload = function () {
        const user = localStorage.getItem('loginUser');

        if (user) {
          showLauncher(JSON.parse(user));
        } else {
          document.getElementById('loginBox').style.display = 'block';

          document.getElementById('launcher').style.display = 'none';
        }
      };
    </script>
  </body>
</html>
